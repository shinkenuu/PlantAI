name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: lint & format check
        run: |
          uv tool run ruff check .
          uv tool run ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: sync deps
        run: uv sync --group dev

      - name: mypy
        run: uv run mypy plantai config.py --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    env:
      # Provide safe defaults so Settings() loads without a real .env
      DODDER_DATABASE_URI: "mongodb://root:toor@127.0.0.1:27017/?authSource=admin"
      DEEPEVAL_TELEMETRY_OPT_OUT: "YES"

    steps:
      - uses: actions/checkout@v4

      - name: install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: sync deps
        run: uv sync --group dev

      - name: run plant unit tests (no hardware, no LLM)
        run: uv run pytest -vvv tests/plants -m "not arduino and not llm"
